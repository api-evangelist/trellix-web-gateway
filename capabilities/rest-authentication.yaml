naftiko: 1.0.0-alpha2
info:
  label: Trellix Web Gateway REST API — Authentication
  description: 'Trellix Web Gateway REST API — Authentication. 2 operations. Lead operation: Authenticate and create a session.
    Self-contained Naftiko capability covering one Trellix Web Gateway business surface.'
  tags:
  - Trellix Web Gateway
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRELLIX_WEB_GATEWAY_API_KEY: TRELLIX_WEB_GATEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-authentication
    baseUri: https://{mwg-server}:{port}/Konfigurator/REST
    description: Trellix Web Gateway REST API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: login
      path: /login
      operations:
      - name: login
        method: POST
        description: Authenticate and create a session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: logout
      path: /logout
      operations:
      - name: logout
        method: POST
        description: End the current session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: JSESSIONID
      value: '{{env.TRELLIX_WEB_GATEWAY_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: rest-authentication-rest
    port: 8080
    description: REST adapter for Trellix Web Gateway REST API — Authentication. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/login
      name: login
      description: REST surface for login.
      operations:
      - method: POST
        name: login
        description: Authenticate and create a session
        call: rest-authentication.login
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/logout
      name: logout
      description: REST surface for logout.
      operations:
      - method: POST
        name: logout
        description: End the current session
        call: rest-authentication.logout
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trellix Web Gateway REST API — Authentication. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: authenticate-and-create-session
      description: Authenticate and create a session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-authentication.login
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: end-current-session
      description: End the current session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-authentication.logout
      outputParameters:
      - type: object
        mapping: $.
