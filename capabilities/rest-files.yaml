naftiko: 1.0.0-alpha2
info:
  label: Trellix Web Gateway REST API — Files
  description: 'Trellix Web Gateway REST API — Files. 4 operations. Lead operation: List available files. Self-contained Naftiko
    capability covering one Trellix Web Gateway business surface.'
  tags:
  - Trellix Web Gateway
  - Files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRELLIX_WEB_GATEWAY_API_KEY: TRELLIX_WEB_GATEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-files
    baseUri: https://{mwg-server}:{port}/Konfigurator/REST
    description: Trellix Web Gateway REST API — Files business capability. Self-contained, no shared references.
    resources:
    - name: files
      path: /files
      operations:
      - name: listfiles
        method: GET
        description: List available files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-fileName
      path: /files/{fileName}
      operations:
      - name: downloadfile
        method: GET
        description: Download a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uploadfile
        method: PUT
        description: Upload a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletefile
        method: DELETE
        description: Delete a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: JSESSIONID
      value: '{{env.TRELLIX_WEB_GATEWAY_API_KEY}}'
      placement: cookie
  exposes:
  - type: rest
    namespace: rest-files-rest
    port: 8080
    description: REST adapter for Trellix Web Gateway REST API — Files. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/files
      name: files
      description: REST surface for files.
      operations:
      - method: GET
        name: listfiles
        description: List available files
        call: rest-files.listfiles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files/{filename}
      name: files-filename
      description: REST surface for files-fileName.
      operations:
      - method: GET
        name: downloadfile
        description: Download a file
        call: rest-files.downloadfile
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: uploadfile
        description: Upload a file
        call: rest-files.uploadfile
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletefile
        description: Delete a file
        call: rest-files.deletefile
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trellix Web Gateway REST API — Files. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-available-files
      description: List available files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-files.listfiles
      outputParameters:
      - type: object
        mapping: $.
    - name: download-file
      description: Download a file
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-files.downloadfile
      outputParameters:
      - type: object
        mapping: $.
    - name: upload-file
      description: Upload a file
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-files.uploadfile
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-file
      description: Delete a file
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-files.deletefile
      outputParameters:
      - type: object
        mapping: $.
