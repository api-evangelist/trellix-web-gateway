    resources:
    - path: /v1/lists
      name: lists
      description: REST surface for lists.
      operations:
      - method: GET
        name: listcustomlists
        description: List custom lists
        call: rest-lists.listcustomlists
        outputParameters:
        - type: object
          mapping: $.
