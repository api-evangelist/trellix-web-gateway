naftiko: "1.0.0-alpha1"

info:
  label: "Trellix Web Gateway Policy API"
  description: >-
    API for managing security policies, rule sets, URL filtering, anti-malware,
    SSL scanning, DLP, and authentication settings on Trellix Web Gateway.
  tags:
    - DLP
    - Policy Management
    - SSL Inspection
    - Threat Protection
    - URL Filtering
    - Web Security
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TWG_SESSION_COOKIE: TWG_SESSION_COOKIE

capability:
  consumes:
    - type: http
      namespace: twg-policy
      baseUri: https://mwg.example.com:4712/Konfigurator/REST/policy
      description: "Trellix Web Gateway Policy management API"
      authentication:
        type: apikey
        key: Cookie
        value: "JSESSIONID={{TWG_SESSION_COOKIE}}"
        placement: header
      resources:
        - name: rule-sets
          path: /rulesets
          description: "Web Gateway policy rule sets"
          operations:
            - name: list-rule-sets
              method: GET
              description: "List all rule sets"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-rule-set
              method: POST
              description: "Create a new rule set"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"

        - name: rule-set-detail
          path: /rulesets/{ruleSetId}
          description: "Single rule set"
          operations:
            - name: get-rule-set
              method: GET
              description: "Get a rule set"
              inputParameters:
                - name: ruleSetId
                  in: path
                  type: string
                  required: true
                  description: "Rule set identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-rule-set
              method: PUT
              description: "Update a rule set"
              inputParameters:
                - name: ruleSetId
                  in: path
                  type: string
                  required: true
                  description: "Rule set identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-rule-set
              method: DELETE
              description: "Delete a rule set"
              inputParameters:
                - name: ruleSetId
                  in: path
                  type: string
                  required: true
                  description: "Rule set identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: url-filtering
          path: /urlfilter/settings
          description: "URL filtering configuration"
          operations:
            - name: get-url-filter-settings
              method: GET
              description: "Get URL filter settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-url-filter-settings
              method: PUT
              description: "Update URL filter settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  blockCategories: "{{tools.blockCategories}}"

        - name: url-lookup
          path: /urlfilter/lookup
          description: "URL categorization lookup"
          operations:
            - name: lookup-url
              method: GET
              description: "Look up URL categorization"
              inputParameters:
                - name: url
                  in: query
                  type: string
                  required: true
                  description: "URL to categorize"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: anti-malware
          path: /antimalware/settings
          description: "Anti-malware settings"
          operations:
            - name: get-anti-malware-settings
              method: GET
              description: "Get anti-malware settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-anti-malware-settings
              method: PUT
              description: "Update anti-malware settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  enableGatewayAntiMalware: "{{tools.enableGatewayAntiMalware}}"

        - name: ssl-settings
          path: /ssl/settings
          description: "SSL/TLS inspection settings"
          operations:
            - name: get-ssl-settings
              method: GET
              description: "Get SSL scanning settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-ssl-settings
              method: PUT
              description: "Update SSL scanning settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  enableSslScanning: "{{tools.enableSslScanning}}"

        - name: dlp-settings
          path: /dlp/settings
          description: "Data Loss Prevention settings"
          operations:
            - name: get-dlp-settings
              method: GET
              description: "Get DLP settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-dlp-settings
              method: PUT
              description: "Update DLP settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  enableDlp: "{{tools.enableDlp}}"

  exposes:
    - type: rest
      port: 8102
      namespace: twg-policy-api
      resources:
        - path: /v1/rule-sets
          name: rule-sets
          description: "Policy rule sets"
          operations:
            - method: GET
              name: list-rule-sets
              description: "List rule sets"
              call: "twg-policy.list-rule-sets"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-rule-set
              description: "Create rule set"
              call: "twg-policy.create-rule-set"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/url-filter/settings
          name: url-filter-settings
          description: "URL filter settings"
          operations:
            - method: GET
              name: get-url-filter-settings
              description: "Get URL filter settings"
              call: "twg-policy.get-url-filter-settings"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/url-filter/lookup
          name: url-lookup
          description: "URL categorization lookup"
          operations:
            - method: GET
              name: lookup-url
              description: "Look up URL"
              call: "twg-policy.lookup-url"
              with:
                url: "rest.url"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/anti-malware/settings
          name: anti-malware-settings
          description: "Anti-malware settings"
          operations:
            - method: GET
              name: get-anti-malware-settings
              description: "Get anti-malware settings"
              call: "twg-policy.get-anti-malware-settings"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/ssl/settings
          name: ssl-settings
          description: "SSL scanning settings"
          operations:
            - method: GET
              name: get-ssl-settings
              description: "Get SSL settings"
              call: "twg-policy.get-ssl-settings"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dlp/settings
          name: dlp-settings
          description: "DLP settings"
          operations:
            - method: GET
              name: get-dlp-settings
              description: "Get DLP settings"
              call: "twg-policy.get-dlp-settings"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: twg-policy-mcp
      transport: http
      tools:
        - name: list-rule-sets
          description: "List all policy rule sets on the Web Gateway"
          hints:
            readOnly: true
            openWorld: true
          call: "twg-policy.list-rule-sets"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-url-filter-settings
          description: "Get URL filtering configuration including blocked categories"
          hints:
            readOnly: true
            openWorld: false
          call: "twg-policy.get-url-filter-settings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: lookup-url
          description: "Look up URL categorization to check how a URL is classified"
          hints:
            readOnly: true
            openWorld: false
          call: "twg-policy.lookup-url"
          with:
            url: "tools.url"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-anti-malware-settings
          description: "Get anti-malware scanning configuration"
          hints:
            readOnly: true
            openWorld: false
          call: "twg-policy.get-anti-malware-settings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-ssl-settings
          description: "Get SSL/TLS inspection configuration"
          hints:
            readOnly: true
            openWorld: false
          call: "twg-policy.get-ssl-settings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dlp-settings
          description: "Get Data Loss Prevention policy settings"
          hints:
            readOnly: true
            openWorld: false
          call: "twg-policy.get-dlp-settings"
          outputParameters:
            - type: object
              mapping: "$."
