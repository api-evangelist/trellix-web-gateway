naftiko: "1.0.0-alpha1"

info:
  label: "Trellix Web Gateway Reporting API"
  description: >-
    API for accessing web traffic logs, security events, threat analytics,
    and generating custom reports from Trellix Web Gateway data.
  tags:
    - Analytics
    - Logs
    - Reporting
    - Security Events
    - Threat Analytics
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TWG_SESSION_COOKIE: TWG_SESSION_COOKIE

capability:
  consumes:
    - type: http
      namespace: twg-reporting
      baseUri: https://mwg.example.com:4712/reporter/api
      description: "Trellix Web Gateway reporting and analytics API"
      authentication:
        type: apikey
        key: Cookie
        value: "JSESSIONID={{TWG_SESSION_COOKIE}}"
        placement: header
      resources:
        - name: traffic-logs
          path: /v1/traffic/logs
          description: "Web traffic logs"
          operations:
            - name: get-traffic-logs
              method: GET
              description: "Retrieve web traffic logs"
              inputParameters:
                - name: from
                  in: query
                  type: string
                  required: false
                  description: "Start timestamp"
                - name: to
                  in: query
                  type: string
                  required: false
                  description: "End timestamp"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: security-events
          path: /v1/events/security
          description: "Security events"
          operations:
            - name: get-security-events
              method: GET
              description: "Retrieve security events"
              inputParameters:
                - name: from
                  in: query
                  type: string
                  required: false
                  description: "Start timestamp"
                - name: to
                  in: query
                  type: string
                  required: false
                  description: "End timestamp"
                - name: severity
                  in: query
                  type: string
                  required: false
                  description: "Event severity filter"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: reports
          path: /v1/reports
          description: "Generated reports"
          operations:
            - name: list-reports
              method: GET
              description: "List available reports"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: generate-report
              method: POST
              description: "Generate a new report"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  from: "{{tools.from}}"
                  to: "{{tools.to}}"

        - name: traffic-statistics
          path: /v1/statistics/traffic
          description: "Traffic statistics"
          operations:
            - name: get-traffic-statistics
              method: GET
              description: "Get traffic statistics"
              inputParameters:
                - name: period
                  in: query
                  type: string
                  required: false
                  description: "Statistics period"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: threat-statistics
          path: /v1/statistics/threats
          description: "Threat statistics"
          operations:
            - name: get-threat-statistics
              method: GET
              description: "Get threat statistics"
              inputParameters:
                - name: period
                  in: query
                  type: string
                  required: false
                  description: "Statistics period"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: top-urls
          path: /v1/top/urls
          description: "Top accessed URLs"
          operations:
            - name: get-top-urls
              method: GET
              description: "Get top accessed URLs"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of top URLs"
                - name: period
                  in: query
                  type: string
                  required: false
                  description: "Time period"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: top-categories
          path: /v1/top/categories
          description: "Top URL categories"
          operations:
            - name: get-top-categories
              method: GET
              description: "Get top URL categories"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Number of categories"
                - name: period
                  in: query
                  type: string
                  required: false
                  description: "Time period"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: twg-reporting-api
      resources:
        - path: /v1/traffic/logs
          name: traffic-logs
          description: "Web traffic logs"
          operations:
            - method: GET
              name: get-traffic-logs
              description: "Get traffic logs"
              call: "twg-reporting.get-traffic-logs"
              with:
                from: "rest.from"
                to: "rest.to"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/events/security
          name: security-events
          description: "Security events"
          operations:
            - method: GET
              name: get-security-events
              description: "Get security events"
              call: "twg-reporting.get-security-events"
              with:
                from: "rest.from"
                to: "rest.to"
                severity: "rest.severity"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/statistics/traffic
          name: traffic-statistics
          description: "Traffic statistics"
          operations:
            - method: GET
              name: get-traffic-statistics
              description: "Get traffic statistics"
              call: "twg-reporting.get-traffic-statistics"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/statistics/threats
          name: threat-statistics
          description: "Threat statistics"
          operations:
            - method: GET
              name: get-threat-statistics
              description: "Get threat statistics"
              call: "twg-reporting.get-threat-statistics"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: twg-reporting-mcp
      transport: http
      tools:
        - name: get-traffic-logs
          description: "Retrieve web traffic logs for analysis and audit"
          hints:
            readOnly: true
            openWorld: true
          call: "twg-reporting.get-traffic-logs"
          with:
            from: "tools.from"
            to: "tools.to"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-security-events
          description: "Retrieve security events including malware detections and policy violations"
          hints:
            readOnly: true
            openWorld: true
          call: "twg-reporting.get-security-events"
          with:
            from: "tools.from"
            to: "tools.to"
            severity: "tools.severity"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-traffic-statistics
          description: "Get web traffic statistics including bandwidth and request counts"
          hints:
            readOnly: true
            openWorld: true
          call: "twg-reporting.get-traffic-statistics"
          with:
            period: "tools.period"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-threat-statistics
          description: "Get threat statistics including malware blocks and category violations"
          hints:
            readOnly: true
            openWorld: true
          call: "twg-reporting.get-threat-statistics"
          with:
            period: "tools.period"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-top-urls
          description: "Get top accessed URLs for visibility into web usage"
          hints:
            readOnly: true
            openWorld: true
          call: "twg-reporting.get-top-urls"
          with:
            limit: "tools.limit"
            period: "tools.period"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-top-categories
          description: "Get top URL categories to understand web browsing patterns"
          hints:
            readOnly: true
            openWorld: true
          call: "twg-reporting.get-top-categories"
          with:
            limit: "tools.limit"
            period: "tools.period"
          outputParameters:
            - type: object
              mapping: "$."
