principles:
  - name: Visibility
    description: Web traffic, policy decisions, and management-API call counts are exposed in the SWG
      admin console; finance reconciles against the annual license contract.
  - name: Allocation
    description: Allocate cost by protected business unit / site and by policy template inside the SWG
      tenant.
  - name: Optimization
    description: Optimization is contractual — right-size protected user counts and consolidate cloud
      vs on-prem deployments at renewal.
  - name: Accountability
    description: Network security / CISO organization owns the SWG contract; procurement manages
      renewal and seat true-up.
