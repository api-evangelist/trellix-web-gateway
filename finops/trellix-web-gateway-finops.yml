specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Trellix Web Gateway
providerId: trellix-web-gateway
publisherName: Trellix Web Gateway
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Cybersecurity
  - Data Loss Prevention
  - Enterprise Security
  - Malware Protection
  - Network Security
  - SSL Inspection
  - Threat Protection
  - URL Filtering
  - Web Gateway
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps framework definition for the Trellix Web Gateway API surface. Provides a FOCUS-aligned
  mapping for cost allocation, usage measurement, and unit-economics reporting across the provider's APIs.
principles:
  - name: Visibility
    description: Make API consumption costs visible to engineering, product, and finance teams in near
      real-time.
  - name: Allocation
    description: Tag every chargeable API call with the consuming team, environment, application, and
      feature so cost can be allocated.
  - name: Optimization
    description: Continuously evaluate request patterns, caching, batching, and tier selection to reduce
      cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Trellix Web Gateway
  ServiceCategory: Developer Tools / API
  ProviderName: Trellix Web Gateway
  PublisherName: Trellix Web Gateway
  InvoiceIssuerName: Trellix Web Gateway
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: compute_seconds
    description: Server-side compute consumed by the request, where applicable
    unit: second
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
apis:
  - name: Trellix Web Gateway REST API
    baseURL: https://<mwg-server>:<port>/Konfigurator/REST
    tags:
      - Appliance Management
      - Configuration Management
      - Enterprise Security
      - Gateway
      - Threat Protection
      - Web Security
    serviceName: Trellix Web Gateway REST API
    serviceCategory: API
  - name: Trellix Web Gateway Reporting API
    baseURL: https://<mwg-server>:<port>/reporter/api
    tags:
      - Analytics
      - Logs
      - Reporting
      - Security Events
    serviceName: Trellix Web Gateway Reporting API
    serviceCategory: API
  - name: Trellix Web Gateway Policy API
    baseURL: https://<mwg-server>:<port>/Konfigurator/REST/policy
    tags:
      - Configuration
      - DLP
      - Policy Management
      - Rules
      - Security Policies
    serviceName: Trellix Web Gateway Policy API
    serviceCategory: API
unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
