specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Trellix Web Gateway
providerId: trellix-web-gateway
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cybersecurity
  - Secure Web Gateway
  - Network Security
  - Rate Limiting
description: Trellix Web Gateway does not publish public rate-limit documentation. Management API
  limits are governed by the customer's purchased SWG license and exposed through the appliance /
  cloud-tenant admin console.
sources:
  - https://www.skyhighsecurity.com/products/secure-web-gateway.html
notes: No public rate-limit page is published. Limits are tied to appliance throughput / cloud-tenant
  capacity defined in the customer license agreement.
responseCodes:
  throttled: 429
limits:
  - name: Tenant Limit
    scope: tenant
    metric: varies
    limit: see appliance / cloud admin console
policies:
  - name: License-Bound Capacity
    description: API throughput is bounded by the appliance throughput class or cloud-tenant capacity
      purchased in the SWG license; limits are surfaced inside the management console rather than
      published publicly.
